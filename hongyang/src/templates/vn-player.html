<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} — Hongyang Visual Novel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap');
    body {
      width: 100vw; height: 100vh; overflow: hidden;
      font-family: 'Noto Sans', sans-serif; background: #000;
    }
    #scene {
      width: 100%; height: 100%; position: relative; cursor: pointer;
      user-select: none; -webkit-user-select: none;
    }
    #bg {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; top: 0; left: 0;
    }
    #character {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%); height: 80%;
      object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
    #dialogue-box {
      position: absolute; bottom: 0; width: 100%;
      padding: 20px 28px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85) 20%);
      min-height: 28%;
    }
    #speaker {
      font-weight: 700; font-size: 1.1em;
      color: #FFD700; margin-bottom: 6px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    #text {
      font-size: 1em; line-height: 1.7; color: #f0f0f0;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    }
    #hint {
      position: absolute; bottom: 10px; right: 20px;
      color: rgba(255,255,255,0.4); font-size: 0.75em;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }
    #title-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; cursor: pointer; z-index: 10;
    }
    #title-screen h1 {
      font-size: 2.5em; margin-bottom: 16px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    #title-screen p {
      font-size: 1.1em; color: rgba(255,255,255,0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    #title-screen .badge {
      margin-top: 32px; font-size: 0.8em;
      color: rgba(255,255,255,0.3);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Title screen -->
  <div id="title-screen" onclick="startGame()">
    <h1 id="game-title"></h1>
    <p>Click anywhere to start</p>
    <div class="badge">Powered by Hongyang</div>
  </div>

  <!-- Game scene -->
  <div id="scene" class="hidden" onclick="advance()">
    <img id="bg" src="" alt="background" />
    <img id="character" src="" alt="character" />
    <div id="dialogue-box">
      <div id="speaker"></div>
      <div id="text"></div>
      <div id="hint">Click to continue ▶</div>
    </div>
  </div>

  <script>
    const DATA = {{{sceneDataJSON}}};
    let sceneIdx = 0, lineIdx = 0;

    document.getElementById('game-title').textContent = DATA.title || 'Visual Novel';

    function startGame() {
      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('scene').classList.remove('hidden');
      render();
    }

    function render() {
      const scene = DATA.scenes[sceneIdx];
      if (!scene) {
        // End of game
        document.getElementById('speaker').textContent = '';
        document.getElementById('text').textContent = '— The End —';
        document.getElementById('character').style.display = 'none';
        document.getElementById('hint').textContent = 'Thank you for playing!';
        return;
      }

      // Set background
      if (scene.background_url) {
        document.getElementById('bg').src = scene.background_url;
      }

      const line = scene.dialogue[lineIdx];
      if (!line) {
        // Move to next scene
        sceneIdx++;
        lineIdx = 0;
        render();
        return;
      }

      // Find character
      const char = DATA.characters.find(c => c.id === line.speaker);
      const charImg = document.getElementById('character');
      if (char && char.image_url) {
        charImg.src = char.image_url;
        charImg.style.display = 'block';
      } else {
        charImg.style.display = 'none';
      }

      // Set dialogue
      document.getElementById('speaker').textContent = char ? char.name : (line.speaker === 'narrator' ? '' : line.speaker);
      document.getElementById('text').textContent = line.text;
    }

    function advance() {
      lineIdx++;
      render();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        const title = document.getElementById('title-screen');
        if (!title.classList.contains('hidden')) {
          startGame();
        } else {
          advance();
        }
      }
    });
  </script>
</body>
</html>
